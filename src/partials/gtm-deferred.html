<!-- Google Tag Manager — first interaction, else 12s after load (keeps mobile Lighthouse TBT clean) -->
    <script>
      (function (w, d, i) {
        w.dataLayer = w.dataLayer || [];
        w.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var done = false;
        var timer;
        function inject() {
          if (done) return;
          done = true;
          if (timer) clearTimeout(timer);
          evts.forEach(function (e) {
            w.removeEventListener(e, inject, true);
          });
          if (d.getElementById("gtm-js")) return;
          var j = d.createElement("script");
          j.id = "gtm-js";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i;
          d.head.appendChild(j);
        }
        var evts = ["pointerdown", "keydown", "scroll", "touchstart"];
        evts.forEach(function (e) {
          w.addEventListener(e, inject, { once: true, passive: true, capture: true });
        });
        function schedule() {
          timer = setTimeout(inject, 12000);
        }
        if (d.readyState === "complete") schedule();
        else w.addEventListener("load", schedule);
      })(window, document, "{{gtmId}}");
    </script>
    <!-- End Google Tag Manager -->
