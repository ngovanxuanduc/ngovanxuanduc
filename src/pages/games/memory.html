---
{
  "title": "Memory · Games",
  "description": "Memory — lật thẻ tìm cặp.",
  "page": "games",
  "scripts": [
    "/js/memory.js"
  ]
}
---
<div class="container">
        <div class="game-header animate-in">
          <a class="game-header__back" href="/games/">← Games</a>
          <h1>Memory</h1>
          <p>Lật hai thẻ. Giống nhau thì giữ. Tìm hết 8 cặp.</p>
        </div>

        <div class="game-shell animate-in animate-in-delay-1">
          <p id="memory-status" class="game-status">Lật hai thẻ giống nhau.</p>
          <div class="memory-stats">
            <span>Lượt: <strong id="memory-moves">0</strong></span>
            <span>Cặp: <strong id="memory-pairs">0 / 8</strong></span>
          </div>
          <div id="memory-board" class="memory-board" aria-label="Bàn memory"></div>
          <div class="game-toolbar">
            <button type="button" class="btn btn--ghost btn--sm" id="memory-reset">
              Chơi lại
            </button>
          </div>
        </div>
      </div>
