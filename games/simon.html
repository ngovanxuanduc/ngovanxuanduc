    <header class="nav">
      <div class="nav__inner">
        <a class="nav__logo" href="/">ngovanxuanduc<span>.com</span></a>
        <button
          class="nav__toggle"
          type="button"
          aria-label="Menu"

          <li><a href="/" data-nav="home">Home</a></li>

    </header>

    <main>
<div class="container">
        <div class="game-header animate-in">
          <a class="game-header__back" href="/games/">← Games</a>
          <h1>Simon</h1>
          <p>
            Xem chuỗi sáng → lặp lại đúng thứ tự. Mỗi vòng thêm 1 màu. Sai =
            hết ván.
          </p>
        </div>

        <div class="game-shell animate-in animate-in-delay-1">
          <div class="simon-stats memory-stats">
            <span>Vòng: <strong id="simon-level">0</strong></span>
            <span>Best: <strong id="simon-best">—</strong></span>
          </div>
          <p id="simon-status" class="game-status">Bấm Bắt đầu.</p>
          <div
            id="simon-board"
            class="simon-board"
            role="group"
            aria-label="Bàn Simon 4 màu"
          >
            <button
              type="button"
              class="simon-pad simon-pad--0"
              data-i="0"
              aria-label="Xanh lá"
              disabled
            ></button>
            <button
              type="button"
              class="simon-pad simon-pad--1"
              data-i="1"
              aria-label="Đỏ"
              disabled
            ></button>
            <button
              type="button"
              class="simon-pad simon-pad--2"
              data-i="2"
              aria-label="Vàng"
              disabled
            ></button>
            <button
              type="button"
              class="simon-pad simon-pad--3"
              data-i="3"
              aria-label="Xanh dương"
              disabled
            ></button>
          </div>
          <div class="game-toolbar">
            <button type="button" class="btn btn--sm" id="simon-start">
              Bắt đầu
            </button>
            <button type="button" class="btn btn--ghost btn--sm" id="simon-reset-best">
              Xóa best
            </button>
          </div>
          <p class="simon-hint">
            Phím <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> hoặc click /
            chạm.
          </p>
        </div>
      </div>

    </main>
    <footer class="footer">
      <div class="footer__inner">
        <p>© <span id="y"></span> Ngo Van Xuan Duc</p>
        <ul class="footer__links">

          <li><a href="/games/">Games</a></li>

      </div>
