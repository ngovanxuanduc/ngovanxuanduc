<!DOCTYPE html>
<html lang="vi">
  <head>
    <!-- GTM loaded deferred at end of body (see gtm-deferred) — keeps head free of third-party JS -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="description" content="Minesweeper — mở ô, tránh mìn. Click phải / long-press để cắm cờ." />
    <title>Dò mìn · Games</title>
    <link rel="icon" href="/favicon.ico" />
    <!-- Self-hosted Inter (UI) — 1 request, same-origin, no Google Fonts -->
    <link
      rel="preload"
      href="/fonts/inter-latin-var.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/css/style.css" as="style" />
    <link rel="stylesheet" href="/css/style.css" />
    
  </head>
  <body data-page="games">
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-W4K2NDNC"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <header class="nav">
      <div class="nav__inner">
        <a class="nav__logo" href="/">ngovanxuanduc<span>.com</span></a>
        <button
          class="nav__toggle"
          type="button"
          aria-label="Menu"
          aria-expanded="false"
        >
          ☰
        </button>
        <ul class="nav__links">
          <li><a href="/" data-nav="home">Home</a></li>
          <li><a href="/calendar.html" data-nav="calendar">Lịch</a></li>
          <li><a href="/tools/" data-nav="tools">Tools</a></li>
          <li><a href="/games/" data-nav="games" class="is-active">Games</a></li>
          <li><a href="/articles/" data-nav="articles">Articles</a></li>
        </ul>
      </div>
    </header>

    <main>
<div class="container">
        <div class="game-header animate-in">
          <a class="game-header__back" href="/games/">← Games</a>
          <h1>Dò mìn</h1>
          <p>Mở hết ô không mìn. Click phải (hoặc giữ) để cắm cờ. Click giữa / cả hai nút để mở quanh số.</p>
        </div>

        <div class="game-shell animate-in animate-in-delay-1">
          <div class="ms-top">
            <label class="tool-check">
              Độ khó
              <select id="ms-diff" class="tool-select" style="width:auto;padding:0.35rem 0.5rem">
                <option value="easy">Dễ 9×9 · 10</option>
                <option value="medium" selected>Vừa 12×12 · 24</option>
                <option value="hard">Khó 16×16 · 40</option>
              </select>
            </label>
            <div class="ms-meta">
              <span>🚩 <strong id="ms-flags">0</strong>/<span id="ms-mines">24</span></span>
              <span>⏱ <strong id="ms-time">0</strong>s</span>
            </div>
            <button type="button" class="btn btn--ghost btn--sm" id="ms-new">Ván mới</button>
          </div>
          <p id="ms-status" class="game-status">Click ô để bắt đầu</p>
          <div id="ms-board" class="ms-board" role="grid" aria-label="Bàn dò mìn"></div>
        </div>
      </div>

    </main>
    <footer class="footer">
      <div class="footer__inner">
        <p>© <span id="y"></span> Ngo Van Xuan Duc</p>
        <ul class="footer__links">
          <li><a href="/">Home</a></li>
          <li><a href="/tools/">Tools</a></li>
          <li><a href="/games/">Games</a></li>
        </ul>
      </div>
    </footer>

    <script>
      (function () {
        var y = document.getElementById("y");
        if (y) y.textContent = new Date().getFullYear();
      })();
    </script>
    <script src="/js/main.js" defer></script>
        <script src="/js/minesweeper.js" defer></script>
    <!-- Google Tag Manager — delayed until after load (avoids main-thread reflow on first paint) -->
    <script>
      (function (w, d, i) {
        w.dataLayer = w.dataLayer || [];
        w.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        function inject() {
          if (d.getElementById("gtm-js")) return;
          var j = d.createElement("script");
          j.id = "gtm-js";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i;
          d.head.appendChild(j);
        }
        function schedule() {
          if ("requestIdleCallback" in w) {
            w.requestIdleCallback(inject, { timeout: 3500 });
          } else {
            setTimeout(inject, 2000);
          }
        }
        if (d.readyState === "complete") schedule();
        else w.addEventListener("load", schedule);
      })(window, document, "GTM-W4K2NDNC");
    </script>
    <!-- End Google Tag Manager -->

  </body>
</html>
