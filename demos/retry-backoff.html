<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo · Retry + backoff + jitter</title>
    <meta
      name="description"
      content="So sánh retry ngay vs exponential backoff + jitter — thundering herd."
    />
    <style>
      :root {
        --bg: #0a0a0b;
        --bg-elevated: #121214;
        --bg-hover: #1a1a1e;
        --border: #2a2a32;
        --text: #f0f0f4;
        --text-muted: #b0b0bc;
        --text-dim: #9a9aa8;
        --accent: #b8a4ff;
        --success: #5eea93;
        --warn: #fbbf24;
        --danger: #ff8f8f;
        --running: #60a5fa;
        --radius: 12px;
        --radius-sm: 8px;
        --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
        min-height: 100vh;
        padding: 1.5rem 1rem 3rem;
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
      }
      header {
        margin-bottom: 1.25rem;
      }
      header h1 {
        font-size: clamp(1.25rem, 3vw, 1.65rem);
        font-weight: 600;
        margin-bottom: 0.4rem;
      }
      header p {
        color: var(--text-muted);
        font-size: 0.95rem;
      }
      header a {
        color: var(--accent);
        text-decoration: none;
      }
      .panel {
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.1rem 1.15rem;
        margin-bottom: 1rem;
      }
      .panel h2 {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-dim);
        margin-bottom: 0.75rem;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1rem;
        align-items: flex-end;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .field label {
        font-size: 0.75rem;
        color: var(--text-dim);
      }
      .field input {
        font: inherit;
        font-family: var(--mono);
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.45rem 0.6rem;
        width: 6rem;
      }
      button {
        font: inherit;
        font-size: 0.88rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.5rem 0.9rem;
        cursor: pointer;
        background: var(--bg-hover);
        color: var(--text);
      }
      button.primary {
        background: var(--accent);
        border-color: transparent;
        color: #0a0a0b;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-left: auto;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .btn-row {
          margin-left: 0;
        }
      }
      .metric {
        font-family: var(--mono);
        font-size: 1.6rem;
        font-weight: 600;
      }
      .metric.hot {
        color: var(--danger);
      }
      .sub {
        font-size: 0.8rem;
        color: var(--text-dim);
      }
      .chart {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 90px;
        margin-top: 0.75rem;
      }
      .chart i {
        flex: 1;
        min-width: 3px;
        background: var(--running);
        border-radius: 2px 2px 0 0;
        min-height: 2px;
      }
      .chart i.hot {
        background: var(--danger);
      }
      .dep {
        margin-top: 0.5rem;
        height: 8px;
        background: #1a1a1e;
        border-radius: 99px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .dep > span {
        display: block;
        height: 100%;
        width: 0%;
        background: var(--warn);
        transition: width 0.1s linear;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Retry storm vs backoff + jitter</h1>
        <p>
          N client fail cùng lúc → retry. So sánh immediate vs exp + full jitter.
          <a href="/articles/retry-backoff-jitter.html">← bài viết</a>
        </p>
      </header>
      <div class="panel">
        <h2>Controls</h2>
        <div class="controls">
          <div class="field">
            <label for="clients">Số client</label>
            <input id="clients" type="number" value="40" min="5" max="120" />
          </div>
          <div class="field">
            <label for="maxAtt">Max attempts</label>
            <input id="maxAtt" type="number" value="5" min="1" max="10" />
          </div>
          <div class="field">
            <label for="baseMs">Base backoff (ms)</label>
            <input id="baseMs" type="number" value="120" min="20" max="1000" />
          </div>
          <div class="field">
            <label for="cap">Capacity server / tick</label>
            <input id="cap" type="number" value="8" min="1" max="50" />
          </div>
          <div class="btn-row">
            <button type="button" class="primary" id="btnRun">Chạy so sánh</button>
          </div>
        </div>
      </div>
      <div class="grid">
        <div class="panel">
          <h2>Immediate retry (delay ≈ 0)</h2>
          <div class="metric hot" id="iPeak">0</div>
          <div class="sub">Peak inflight · success <span id="iOk">0</span> · give-up <span id="iFail">0</span></div>
          <div class="dep"><span id="iLoad"></span></div>
          <div class="chart" id="iChart"></div>
        </div>
        <div class="panel">
          <h2>Exp backoff + full jitter</h2>
          <div class="metric" id="jPeak" style="color: var(--success)">0</div>
          <div class="sub">Peak inflight · success <span id="jOk">0</span> · give-up <span id="jFail">0</span></div>
          <div class="dep"><span id="jLoad"></span></div>
          <div class="chart" id="jChart"></div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const $ = (id) => document.getElementById(id);

        function createServer(capPerTick) {
          let queue = 0;
          let peak = 0;
          let samples = [];
          return {
            async request(latency = 40) {
              queue++;
              if (queue > peak) peak = queue;
              await new Promise((r) => setTimeout(r, latency));
              // admit if under capacity (simplified)
              const ok = Math.random() < Math.min(1, capPerTick / Math.max(queue, 1));
              // overload → more fail
              const failRate = queue > capPerTick * 2 ? 0.85 : queue > capPerTick ? 0.55 : 0.15;
              queue--;
              samples.push(queue + 1);
              if (samples.length > 48) samples.shift();
              if (Math.random() < failRate) {
                const e = new Error("503");
                e.transient = true;
                throw e;
              }
              return true;
            },
            peak: () => peak,
            samples: () => samples.slice(),
            reset() {
              queue = peak = 0;
              samples = [];
            },
          };
        }

        function paintChart(el, samples) {
          el.innerHTML = "";
          const max = Math.max(1, ...samples, 1);
          samples.forEach((v) => {
            const i = document.createElement("i");
            i.style.height = Math.max(2, (v / max) * 86) + "px";
            if (v > max * 0.7) i.className = "hot";
            el.appendChild(i);
          });
        }

        async function runClient(server, mode, maxAtt, baseMs) {
          for (let a = 0; a < maxAtt; a++) {
            try {
              await server.request();
              return "ok";
            } catch (e) {
              if (a === maxAtt - 1) return "fail";
              let delay = 0;
              if (mode === "jitter") {
                const exp = Math.min(3000, baseMs * 2 ** a);
                delay = Math.random() * exp;
              }
              await new Promise((r) => setTimeout(r, delay));
            }
          }
          return "fail";
        }

        async function runLane(mode, clients, maxAtt, baseMs, cap, peakEl, okEl, failEl, chartEl, loadEl) {
          const server = createServer(cap);
          let ok = 0,
            fail = 0;
          const tick = setInterval(() => {
            const s = server.samples();
            const last = s[s.length - 1] || 0;
            loadEl.style.width = Math.min(100, (last / (cap * 3)) * 100) + "%";
            paintChart(chartEl, s);
            peakEl.textContent = server.peak();
          }, 80);

          const jobs = [];
          for (let i = 0; i < clients; i++) {
            jobs.push(
              runClient(server, mode, maxAtt, baseMs).then((r) => {
                if (r === "ok") ok++;
                else fail++;
              })
            );
            // tiny stagger so UI not frozen
            if (i % 10 === 0) await new Promise((r) => setTimeout(r, 0));
          }
          await Promise.all(jobs);
          clearInterval(tick);
          peakEl.textContent = server.peak();
          peakEl.className = "metric" + (mode === "immediate" ? " hot" : "");
          if (mode === "jitter") peakEl.style.color = "var(--success)";
          okEl.textContent = ok;
          failEl.textContent = fail;
          paintChart(chartEl, server.samples());
        }

        $("btnRun").onclick = async () => {
          $("btnRun").disabled = true;
          const clients = Math.min(120, Math.max(5, +$("clients").value || 40));
          const maxAtt = Math.max(1, +$("maxAtt").value || 5);
          const baseMs = Math.max(20, +$("baseMs").value || 120);
          const cap = Math.max(1, +$("cap").value || 8);
          await Promise.all([
            runLane(
              "immediate",
              clients,
              maxAtt,
              baseMs,
              cap,
              $("iPeak"),
              $("iOk"),
              $("iFail"),
              $("iChart"),
              $("iLoad")
            ),
            runLane(
              "jitter",
              clients,
              maxAtt,
              baseMs,
              cap,
              $("jPeak"),
              $("jOk"),
              $("jFail"),
              $("jChart"),
              $("jLoad")
            ),
          ]);
          $("btnRun").disabled = false;
        };
      })();
    </script>
  </body>
</html>
