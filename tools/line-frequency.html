    <link rel="icon" href="/favicon.ico" />

      href="/fonts/inter-latin-var.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

      ><iframe

        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <header class="nav">
      <div class="nav__inner">
        <a class="nav__logo" href="/">ngovanxuanduc<span>.com</span></a>
        <button
          class="nav__toggle"
          type="button"
          aria-label="Menu"
          aria-expanded="false"
        >
          ☰
        </button>
        <ul class="nav__links">
          <li><a href="/" data-nav="home">Home</a></li>
          <li><a href="/calendar.html" data-nav="calendar">Lịch</a></li>
          <li><a href="/tools/" data-nav="tools" class="is-active">Tools</a></li>
          <li><a href="/games/" data-nav="games">Games</a></li>
          <li><a href="/articles/" data-nav="articles">Articles</a></li>
        </ul>
      </div>
    </header>

    <main>
<div class="container container--cal">
        <div class="game-header">
          <a class="game-header__back" href="/tools/">← Tools</a>
          <h1>Đếm tần suất dòng</h1>
          <p>
            Đếm mỗi dòng xuất hiện bao nhiêu lần. Output dạng
            <code>số lần + tab + nội dung</code>.
          </p>
        </div>

        <div class="tool-shell">
          <div class="tool-row tool-row--2">
            <div class="tool-field">
              <label for="lf-input">Input</label>
              <textarea
                id="lf-input"
                class="tool-textarea tool-textarea--tall"
                placeholder="red&#10;blue&#10;red&#10;green&#10;blue&#10;blue"
                spellcheck="false"
              ></textarea>
            </div>
            <div class="tool-field">
              <label for="lf-out">Output</label>
              <textarea
                id="lf-out"
                class="tool-textarea tool-textarea--tall tool-textarea--result"
                readonly
                spellcheck="false"
              ></textarea>
            </div>
          </div>

          <div class="tool-actions">
            <button type="button" class="btn btn--primary btn--sm" id="lf-run">Chạy</button>
            <label class="tool-check">
              Sort
              <select id="lf-sort" class="tool-select" style="width: auto; padding: 0.35rem 0.5rem">
                <option value="freq-desc">Nhiều → ít</option>
                <option value="freq-asc">Ít → nhiều</option>
                <option value="alpha">A → Z</option>
                <option value="first">Thứ tự lần đầu</option>
              </select>
            </label>
            <label class="tool-check">
              <input type="checkbox" id="lf-only-dup" />
              Chỉ dòng trùng (≥2)
            </label>
            <label class="tool-check">
              <input type="checkbox" id="lf-ignore-case" />
              Ignore case
            </label>
            <label class="tool-check">
              <input type="checkbox" id="lf-trim" checked />
              Trim
            </label>
            <label class="tool-check">
              <input type="checkbox" id="lf-drop-empty" checked />
              Bỏ dòng trống
            </label>
            <button type="button" class="btn btn--primary btn--sm" id="lf-copy">Copy</button>
            <button type="button" class="btn btn--ghost btn--sm" id="lf-clear">Xóa</button>
            <span class="tool-meta" id="lf-meta"></span>
          </div>
        </div>
      </div>

    </main>
    <footer class="footer">
      <div class="footer__inner">
        <p>© <span id="y"></span> Ngo Van Xuan Duc</p>
        <ul class="footer__links">
          <li><a href="/">Home</a></li>
          <li><a href="/tools/">Tools</a></li>
          <li><a href="/games/">Games</a></li>
        </ul>
      </div>
    </footer>

    <script>
      (function () {
        var y = document.getElementById("y");
        if (y) y.textContent = new Date().getFullYear();
      })();
    </script>
    <script src="/js/main.js" defer></script>
        <script src="/js/tools/lib.js" defer></script>
    <script src="/js/tools/line-frequency.js" defer></script>
    <!-- Google Tag Manager — delayed until after load (avoids main-thread reflow on first paint) -->
    <script>
      (function (w, d, i) {
        w.dataLayer = w.dataLayer || [];
        w.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        function inject() {
          if (d.getElementById("gtm-js")) return;
          var j = d.createElement("script");
          j.id = "gtm-js";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i;
          d.head.appendChild(j);
        }
        function schedule() {
          if ("requestIdleCallback" in w) {
            w.requestIdleCallback(inject, { timeout: 3500 });
          } else {
            setTimeout(inject, 2000);
          }
        }
        if (d.readyState === "complete") schedule();
        else w.addEventListener("load", schedule);
      })(window, document, "GTM-W4K2NDNC");
    </script>
    <!-- End Google Tag Manager -->

  </body>
</html>
