        <div class="tool-shell">
          <div class="ip-card">

                  <span class="ip-card__label">IPv6</span>
                  <button type="button" class="btn btn--ghost btn--sm ip-row__copy" id="ip-copy-v6" disabled>Copy</button>
                </div>
                <div class="ip-card__value ip-card__value--sm" id="ip-v6">…</div>
              </div>
            </div>

            <p class="ip-card__status" id="ip-status">Đang lấy IP…</p>

            <div class="tool-actions" style="justify-content: center; margin-top: 1rem">
              <button type="button" class="btn btn--primary btn--sm" id="ip-refresh">Làm mới</button>
              <button type="button" class="btn btn--ghost btn--sm" id="ip-copy-both" disabled>Copy cả hai</button>
            </div>

            <dl class="ip-details" id="ip-details"></dl>
          </div>
        </div>
