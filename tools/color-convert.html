          </div>
          <div class="tool-actions">
            <input id="co-picker" type="color" value="#a78bfa" style="width:48px;height:36px;border:none;background:transparent;cursor:pointer" />
            <span class="tool-meta" id="co-meta"></span>
          </div>
        </div>
