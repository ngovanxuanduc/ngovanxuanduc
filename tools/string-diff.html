        <a class="nav__logo" href="/">ngovanxuanduc<span>.com</span></a>
        <button
          class="nav__toggle"
          type="button"
          aria-label="Menu"
          aria-expanded="false"

          ☰

        <ul class="nav__links">
          <li><a href="/" data-nav="home">Home</a></li>

    <main>
<div class="container container--cal">
        <div class="game-header">
          <a class="game-header__back" href="/tools/">← Tools</a>
          <h1>Diff string</h1>
          <p>
            So sánh theo dòng (Myers cho đoạn vừa, fast path cho list rất lớn).
            Xanh = thêm (B), đỏ = xóa (A), xám = giống. Dataset lớn: bấm «So sánh».
          </p>
        </div>

        <div class="tool-shell">
          <div class="tool-row tool-row--2">
            <div class="tool-field">
              <label for="diff-a">Text A (cũ)</label>
              <textarea id="diff-a" class="tool-textarea" placeholder="Dán text A…" spellcheck="false"></textarea>
            </div>
            <div class="tool-field">
              <label for="diff-b">Text B (mới)</label>
              <textarea id="diff-b" class="tool-textarea" placeholder="Dán text B…" spellcheck="false"></textarea>
            </div>
          </div>

          <div class="tool-actions">
            <button type="button" class="btn btn--primary btn--sm" id="diff-run">So sánh</button>
            <button type="button" class="btn btn--ghost btn--sm" id="diff-clear">Xóa</button>
            <label class="tool-check">
              <input type="checkbox" id="diff-ignore-ws" />
              Bỏ qua khoảng trắng thừa
            </label>
            <span class="tool-meta" id="diff-meta"></span>
          </div>

          <div id="diff-out" class="diff-view" aria-live="polite"></div>
        </div>
      </div>

    </main>
    <footer class="footer">
      <div class="footer__inner">
        <p>© <span id="y"></span> Ngo Van Xuan Duc</p>
        <ul class="footer__links">

          <li><a href="/tools/">Tools</a></li>
          <li><a href="/games/">Games</a></li>
        </ul>
      </div>
    </footer>

    <script>

        if (y) y.textContent = new Date().getFullYear();
      })();

        <script src="/js/tools/lib.js" defer></script>

          j.id = "gtm-js";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i;

            w.requestIdleCallback(inject, { timeout: 3500 });
