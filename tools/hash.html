        style="display: none; visibility: hidden"

    <!-- End Google Tag Manager (noscript) -->

    <header class="nav">
      <div class="nav__inner">
        <a class="nav__logo" href="/">ngovanxuanduc<span>.com</span></a>
        <button
          class="nav__toggle"
          type="button"
          aria-label="Menu"
          aria-expanded="false"
        >
          ☰
        </button>
        <ul class="nav__links">
          <li><a href="/" data-nav="home">Home</a></li>
          <li><a href="/calendar.html" data-nav="calendar">Lịch</a></li>
          <li><a href="/tools/" data-nav="tools" class="is-active">Tools</a></li>
          <li><a href="/games/" data-nav="games">Games</a></li>
          <li><a href="/articles/" data-nav="articles">Articles</a></li>
        </ul>
      </div>
    </header>

    <main>
<div class="container container--cal">
        <div class="game-header">
          <a class="game-header__back" href="/tools/">← Tools</a>
          <h1>Hash</h1>
          <p>SHA-1 / SHA-256 / SHA-384 / SHA-512 qua Web Crypto — offline.</p>
        </div>
        <div class="tool-shell">

          <div class="tool-field">
            <label for="hash-in">Input text</label>
            <textarea id="hash-in" class="tool-textarea" placeholder="Nhập text…" spellcheck="false"></textarea>
          </div>
          <div class="tool-actions">
            <label class="tool-check">Algo
              <select id="hash-algo" class="tool-select" style="width:auto;padding:0.35rem 0.5rem">
                <option value="SHA-256">SHA-256</option>
                <option value="SHA-1">SHA-1</option>
                <option value="SHA-384">SHA-384</option>
                <option value="SHA-512">SHA-512</option>
              </select>
            </label>
            <button type="button" class="btn btn--primary btn--sm" id="hash-run">Hash</button>
            <button type="button" class="btn btn--ghost btn--sm" id="hash-copy">Copy</button>
            <button type="button" class="btn btn--ghost btn--sm" id="hash-clear">Xóa</button>
            <span class="tool-meta" id="hash-meta"></span>
          </div>
          <div class="tool-field">
            <label for="hash-out">Hash (hex)</label>
            <textarea id="hash-out" class="tool-textarea tool-textarea--result" readonly spellcheck="false"></textarea>
          </div>
          <div class="tool-field">
            <label for="hash-file">Hoặc hash file local</label>
            <input id="hash-file" class="tool-input" type="file" />
            <p class="tool-field__hint">File không upload đi đâu — chỉ đọc trong máy bạn.</p>
          </div>
        </div>
      </div>

    </main>
    <footer class="footer">
      <div class="footer__inner">
        <p>© <span id="y"></span> Ngo Van Xuan Duc</p>
        <ul class="footer__links">
          <li><a href="/">Home</a></li>
          <li><a href="/tools/">Tools</a></li>
          <li><a href="/games/">Games</a></li>
        </ul>
      </div>
    </footer>

    <script>
      (function () {
        var y = document.getElementById("y");
        if (y) y.textContent = new Date().getFullYear();
      })();
    </script>
    <script src="/js/main.js" defer></script>
        <script src="/js/tools/lib.js" defer></script>
    <script src="/js/tools/hash.js" defer></script>
    <!-- Google Tag Manager — delayed until after load (avoids main-thread reflow on first paint) -->
    <script>
      (function (w, d, i) {
        w.dataLayer = w.dataLayer || [];
        w.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        function inject() {
          if (d.getElementById("gtm-js")) return;
          var j = d.createElement("script");
          j.id = "gtm-js";
          j.async = true;
          j.src = "https://www.googletagmanager.com/gtm.js?id=" + i;
          d.head.appendChild(j);
        }
        function schedule() {
          if ("requestIdleCallback" in w) {
            w.requestIdleCallback(inject, { timeout: 3500 });
          } else {
            setTimeout(inject, 2000);
          }
        }
        if (d.readyState === "complete") schedule();
        else w.addEventListener("load", schedule);
      })(window, document, "GTM-W4K2NDNC");
    </script>
    <!-- End Google Tag Manager -->

  </body>
</html>
